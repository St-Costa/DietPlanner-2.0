<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Plate circle -->
  <circle cx="256" cy="240" r="155" fill="white" opacity="0.95"/>
  <circle cx="256" cy="240" r="135" fill="none" stroke="#E8F5E9" stroke-width="3"/>
  <!-- Fork (left) -->
  <g fill="#2E7D32">
    <rect x="155" y="100" width="6" height="80" rx="3"/>
    <rect x="170" y="100" width="6" height="80" rx="3"/>
    <rect x="185" y="100" width="6" height="80" rx="3"/>
    <rect x="152" y="175" width="42" height="15" rx="7"/>
    <rect x="167" y="185" width="12" height="95" rx="6"/>
  </g>
  <!-- Knife (right) -->
  <g fill="#2E7D32">
    <path d="M325 100 C325 100 340 100 340 100 L340 180 C340 190 325 190 325 180 Z"/>
    <rect x="327" y="185" width="12" height="95" rx="6"/>
  </g>
  <!-- Leaf on plate -->
  <g transform="translate(256,230)">
    <path d="M0,-50 C30,-45 55,-20 50,15 C45,35 20,50 0,50 C-20,50 -45,35 -50,15 C-55,-20 -30,-45 0,-50Z" fill="#66BB6A" opacity="0.8"/>
    <path d="M0,-45 C0,-45 0,45 0,45" stroke="#2E7D32" stroke-width="2.5" fill="none"/>
    <path d="M0,-25 C15,-20 25,-10 30,5" stroke="#2E7D32" stroke-width="1.8" fill="none"/>
    <path d="M0,-25 C-15,-20 -25,-10 -30,5" stroke="#2E7D32" stroke-width="1.8" fill="none"/>
    <path d="M0,-5 C12,0 20,10 22,20" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
    <path d="M0,-5 C-12,0 -20,10 -22,20" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Calculator/list icon bottom right -->
  <g transform="translate(340,370)">
    <rect x="0" y="0" width="80" height="95" rx="12" fill="white" opacity="0.95"/>
    <rect x="0" y="0" width="80" height="95" rx="12" fill="none" stroke="#2E7D32" stroke-width="3"/>
    <rect x="15" y="15" width="50" height="12" rx="3" fill="#4CAF50"/>
    <rect x="15" y="38" width="22" height="8" rx="2" fill="#A5D6A7"/>
    <rect x="43" y="38" width="22" height="8" rx="2" fill="#A5D6A7"/>
    <rect x="15" y="52" width="22" height="8" rx="2" fill="#C8E6C9"/>
    <rect x="43" y="52" width="22" height="8" rx="2" fill="#C8E6C9"/>
    <rect x="15" y="66" width="22" height="8" rx="2" fill="#A5D6A7"/>
    <rect x="43" y="66" width="22" height="8" rx="2" fill="#A5D6A7"/>
  </g>
  <!-- App name -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="52" fill="white" letter-spacing="2">DietPlanner</text>
</svg>
